<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CropGuard Ghana 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --soil: #2C1810;
      --bark: #4A2C17;
      --leaf-dark: #1B4332;
      --leaf: #2D6A4F;
      --leaf-light: #52B788;
      --sun: #F4A261;
      --gold: #E76F51;
      --cream: #FEFAE0;
      --sand: #DDA15E;
      --mist: #D8F3DC;
      --white: #FFFFFF;
      --chat-w: 760px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--soil);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Organic background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(45,106,79,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(244,162,97,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(27,67,50,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Leaf decoration */
    .leaf-deco {
      position: fixed;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
      font-size: 180px;
      line-height: 1;
      user-select: none;
    }
    .leaf-deco.tl { top: -20px; left: -20px; transform: rotate(-30deg); }
    .leaf-deco.br { bottom: -20px; right: -30px; transform: rotate(150deg); }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(82,183,136,0.15);
      background: rgba(27,67,50,0.4);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(82,183,136,0.35);
    }

    .logo-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--cream);
      letter-spacing: -0.3px;
    }

    .logo-text p {
      font-size: 11px;
      color: var(--leaf-light);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(82,183,136,0.12);
      border: 1px solid rgba(82,183,136,0.25);
      border-radius: 24px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--leaf-light);
      font-weight: 500;
    }

    .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--leaf-light);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Crop pills */
    .crop-bar {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 14px 32px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .crop-bar::-webkit-scrollbar { display: none; }

    .crop-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      font-size: 13px;
      color: rgba(254,250,224,0.7);
      font-weight: 400;
    }
    .crop-pill:hover {
      background: rgba(82,183,136,0.15);
      border-color: rgba(82,183,136,0.35);
      color: var(--cream);
    }

    /* Main chat area */
    main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: var(--chat-w);
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(82,183,136,0.3); border-radius: 4px; }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      animation: msg-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bot-avatar {
      background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
      box-shadow: 0 2px 12px rgba(82,183,136,0.4);
    }

    .user-avatar {
      background: linear-gradient(135deg, var(--sand), var(--gold));
      box-shadow: 0 2px 12px rgba(244,162,97,0.35);
    }

    .bubble {
      max-width: 76%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
    }

    .bot-bubble {
      background: rgba(27,67,50,0.7);
      border: 1px solid rgba(82,183,136,0.2);
      border-top-left-radius: 4px;
      color: var(--cream);
      backdrop-filter: blur(8px);
    }

    .user-bubble {
      background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
      border-top-right-radius: 4px;
      color: white;
      box-shadow: 0 2px 16px rgba(82,183,136,0.3);
    }

    /* Markdown-like rendering */
    .bubble h2 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--sun);
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(244,162,97,0.25);
      padding-bottom: 7px;
    }
    .bubble strong { color: var(--leaf-light); font-weight: 500; }
    .bubble em { color: rgba(254,250,224,0.65); font-style: italic; }
    .bubble br { display: block; content: ''; margin: 3px 0; }

    .disease-tag {
      display: inline-block;
      background: rgba(244,162,97,0.15);
      border: 1px solid rgba(244,162,97,0.3);
      color: var(--sun);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      margin: 2px 3px 2px 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .disease-tag:hover {
      background: rgba(244,162,97,0.25);
      transform: translateY(-1px);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: rgba(27,67,50,0.6);
      border: 1px solid rgba(82,183,136,0.15);
      border-radius: 18px;
      border-top-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--leaf-light);
      border-radius: 50%;
      animation: typing 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* Suggested questions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }
    .suggestion-chip {
      background: rgba(82,183,136,0.1);
      border: 1px solid rgba(82,183,136,0.25);
      color: var(--leaf-light);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .suggestion-chip:hover {
      background: rgba(82,183,136,0.2);
      transform: translateY(-1px);
    }

    /* Input area */
    .input-wrap {
      position: relative;
      z-index: 10;
      padding: 16px;
      background: rgba(27,67,50,0.5);
      border-top: 1px solid rgba(82,183,136,0.12);
      backdrop-filter: blur(12px);
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: var(--chat-w);
      margin: 0 auto;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: rgba(254,250,224,0.07);
      border: 1.5px solid rgba(82,183,136,0.25);
      border-radius: 16px;
      padding: 13px 18px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 50px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
      outline: none;
    }

    #user-input::placeholder { color: rgba(254,250,224,0.3); }
    #user-input:focus { border-color: var(--leaf-light); }

    #send-btn {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(82,183,136,0.35);
      flex-shrink: 0;
    }
    #send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(82,183,136,0.45); }
    #send-btn:active { transform: translateY(0); }
    #send-btn svg { width: 20px; height: 20px; fill: white; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: rgba(254,250,224,0.25);
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 8px;
      max-width: var(--chat-w);
      margin: 0 auto 10px;
      flex-wrap: wrap;
    }
    .qa-btn {
      background: transparent;
      border: 1px solid rgba(82,183,136,0.2);
      color: rgba(254,250,224,0.5);
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .qa-btn:hover {
      border-color: rgba(82,183,136,0.45);
      color: var(--leaf-light);
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .crop-bar { padding: 12px 16px; }
      .bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<div class="leaf-deco tl">🌿</div>
<div class="leaf-deco br">🌿</div>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div class="logo-text">
      <h1>CropGuard Ghana</h1>
      <p>Crop Disease Intelligence</p>
    </div>
  </div>
  <div class="header-badge">
    <span class="dot-live"></span>
    AI Assistant Active
  </div>
</header>

<div class="crop-bar">
  <span style="font-size:12px;color:rgba(254,250,224,0.35);align-self:center;margin-right:4px;">Quick:</span>
  <button class="crop-pill" onclick="sendMessage('What diseases affect maize?')">🌽 Maize</button>
  <button class="crop-pill" onclick="sendMessage('What diseases affect cocoa?')">🍫 Cocoa</button>
  <button class="crop-pill" onclick="sendMessage('What diseases affect cassava?')">🥔 Cassava</button>
  <button class="crop-pill" onclick="sendMessage('What diseases affect tomato?')">🍅 Tomato</button>
  <button class="crop-pill" onclick="sendMessage('What diseases affect yam?')">🍠 Yam</button>
  <button class="crop-pill" onclick="sendMessage('list crops')">📋 All Diseases</button>
</div>

<main>
  <div id="chat-messages"></div>
</main>

<div class="input-wrap">
  <div class="quick-actions">
    <button class="qa-btn" onclick="sendMessage('My maize leaves have yellow streaks')">Yellow streaks on maize</button>
    <button class="qa-btn" onclick="sendMessage('Tell me about black pod disease')">Black pod in cocoa</button>
    <button class="qa-btn" onclick="sendMessage('fall armyworm treatment')">Fall armyworm</button>
    <button class="qa-btn" onclick="sendMessage('help')">❓ Help</button>
  </div>
  <div class="input-row">
    <textarea id="user-input" placeholder="Describe symptoms or ask about a crop disease..." rows="1"></textarea>
    <button id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">CropGuard supports Maize · Cocoa · Cassava · Tomato · Yam &nbsp;|&nbsp; Advice is guidance only — consult MOFA for critical issues</p>
</div>

<script>
const messagesEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('user-input');

const SUGGESTIONS = [
  "Tell me about fall armyworm",
  "How do I treat black pod disease?",
  "What are symptoms of cassava mosaic?",
  "List all crops you support",
];

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

function scrollToBottom() {
  setTimeout(() => {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }, 50);
}

function addMessage(text, role, extra) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'bot' ? 'bot-avatar' : 'user-avatar'}`;
  avatar.textContent = role === 'bot' ? '🌿' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'bot' ? 'bot-bubble' : 'user-bubble'}`;
  bubble.innerHTML = renderMarkdown(text);

  // Disease tags for clarify type
  if (extra?.matches) {
    const tagsDiv = document.createElement('div');
    tagsDiv.style.marginTop = '10px';
    extra.matches.forEach(d => {
      const tag = document.createElement('span');
      tag.className = 'disease-tag';
      tag.textContent = d.replace(/\b\w/g, c => c.toUpperCase());
      tag.onclick = () => sendMessage(`Tell me about ${d}`);
      tagsDiv.appendChild(tag);
    });
    bubble.appendChild(tagsDiv);
  }

  // Suggestions for greeting/help
  if (extra?.showSuggestions) {
    const sugg = document.createElement('div');
    sugg.className = 'suggestions';
    SUGGESTIONS.forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'suggestion-chip';
      chip.textContent = s;
      chip.onclick = () => sendMessage(s);
      sugg.appendChild(chip);
    });
    bubble.appendChild(sugg);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollToBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot-avatar';
  avatar.textContent = '🌿';

  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'typing-dot';
    ind.appendChild(d);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(ind);
  messagesEl.appendChild(wrap);
  scrollToBottom();
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function renderMarkdown(text) {
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/_(.+?)_/g, '<em>$1</em>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

async function sendMessage(text) {
  const msg = text || inputEl.value.trim();
  if (!msg) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage(msg, 'user');
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await res.json();
    removeTyping();

    const r = data.response;
    const showSugg = ['greeting', 'help', 'farewell'].includes(r.type);
    addMessage(r.message, 'bot', {
      matches: r.matches,
      showSuggestions: showSugg,
    });
  } catch (err) {
    removeTyping();
    addMessage('Sorry, something went wrong. Please try again.', 'bot');
  }
}

function handleSend() {
  sendMessage(inputEl.value.trim());
}

// Welcome message on load
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addMessage(
      "Akwaaba! 👋 I'm **CropGuard**, your AI farming assistant for Ghana.\n\n" +
      "I can help you **identify crop diseases**, understand their **symptoms**, " +
      "and get **treatment advice** — tailored for Ghanaian crops.\n\n" +
      "**Try asking me:**\n" +
      "• *My maize leaves have yellow streaks — what's wrong?*\n" +
      "• *How do I treat black pod disease in cocoa?*\n" +
      "• *What pests affect cassava?*",
      'bot',
      { showSuggestions: true }
    );
  }, 400);
});
</script>
</body>
</html>
