# ─────────────────────────────────────────────────────────────
# CropGuard Ghana — Docker Compose
# Usage:
#   docker compose up -d        # start
#   docker compose down         # stop and remove containers
# ─────────────────────────────────────────────────────────────
services:
  app:
    image: ${ACR_SERVER}/cropguard-ghana:${IMAGE_TAG:-latest}
    container_name: cropguard_ghana
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-changeme-in-production}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - cropguard_net

networks:
  cropguard_net:
    driver: bridge
