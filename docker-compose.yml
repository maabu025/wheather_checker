# ─────────────────────────────────────────────────────────────
# CropGuard Ghana — Docker Compose
# Usage:
#   docker compose up --build        # build and start
#   docker compose down              # stop and remove containers
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cropguard_ghana
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      # Add your real secret key here or via a .env file
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-changeme-in-production}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      # Optional: mount a local .env file for secrets
      - .env.local:/app/.env:ro
    networks:
      - cropguard_net

networks:
  cropguard_net:
    driver: bridge
