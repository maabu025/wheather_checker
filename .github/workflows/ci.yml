name: CropGuard CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-flask

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 \
            --exclude=__pycache__,venv,.venv \
            --ignore=E501,W503,F401,W292 \
            --statistics

      - name: Run tests with pytest
        run: |
          PYTHONPATH=src pytest test_chatbot.py -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: cropguard-ghana:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d \
            --name cropguard_test \
            -p 5000:5000 \
            -e FLASK_ENV=production \
            -e FLASK_SECRET_KEY=ci-test-secret \
            cropguard-ghana:ci-${{ github.sha }}

          echo "Waiting for container to start..."
          sleep 8

          curl --fail --silent --show-error http://localhost:5000/health \
            || (echo "Health check failed!" && docker logs cropguard_test && exit 1)

          echo "Container health check passed"
          docker stop cropguard_test

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cropguard-ghana:ci-${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Terraform with tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: false
