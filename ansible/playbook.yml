---
- name: Configure CropGuard app VM
  hosts: app_vm
  become: true

  vars:
    app_dir: /opt/cropguard
    acr_server: "{{ lookup('env', 'ACR_LOGIN_SERVER') }}"
    acr_username: "{{ lookup('env', 'ACR_USERNAME') }}"
    acr_password: "{{ lookup('env', 'ACR_PASSWORD') }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add azureuser to docker group
      user:
        name: azureuser
        groups: docker
        append: true

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: azureuser
        mode: "0755"

    - name: Copy docker-compose.yml to VM
      copy:
        src: ../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: azureuser
        mode: "0644"

    - name: Log in to Azure Container Registry
      command: >
        docker login {{ acr_server }}
        -u {{ acr_username }}
        -p {{ acr_password }}

    - name: Pull latest image from ACR
      command: docker pull {{ acr_server }}/cropguard-ghana:{{ image_tag }}

    - name: Deploy application with docker compose
      shell: |
        export IMAGE={{ acr_server }}/cropguard-ghana:{{ image_tag }}
        docker compose -f {{ app_dir }}/docker-compose.yml up -d --pull always
      environment:
        IMAGE: "{{ acr_server }}/cropguard-ghana:{{ image_tag }}"
        